name: Cross-platform CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e ".[dev]" || pip install -e .

      - name: Smoke test – help
        run: python -m ghidra_re_skill --help

      - name: Run tests (if present)
        run: |
          if python -c "import pytest" 2>/dev/null && [ -d tests ]; then
            pytest tests/
          else
            echo "No pytest or tests/ directory found – skipping."
          fi
        shell: bash

      - name: Verify only allowed .sh files remain (Unix)
        if: runner.os != 'Windows'
        run: |
          # scripts/common.sh is a sourced library (not a standalone tool); allow it.
          found=$(find . -name "*.sh" \
            -not -path "./.git/*" \
            -not -path "./scripts/common.sh" \
            2>/dev/null || true)
          if [ -n "$found" ]; then
            echo "FAIL: unexpected .sh files present:"
            echo "$found"
            exit 1
          else
            echo "OK: only allowed .sh files found"
          fi

      - name: Verify only allowed .sh files remain (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $allowed = @("scripts\common.sh")
          $files = Get-ChildItem -Recurse -Filter "*.sh" -ErrorAction SilentlyContinue |
                   Where-Object { $_.FullName -notlike "*\.git\*" } |
                   Where-Object { $rel = $_.FullName.Substring((Get-Location).Path.Length + 1); $rel -notin $allowed }
          if ($files) {
            Write-Error "FAIL: unexpected .sh files present: $($files.FullName -join ', ')"
            exit 1
          } else {
            Write-Output "OK: only allowed .sh files found"
          }
